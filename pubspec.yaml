name: smart_bottom_sheet
description: A smart, feature-rich Flutter bottom sheet package with snap points, physics-based dragging, form, stepper, confirmation, and rating sheets.
version: 1.0.0

homepage: https://github.com/flutterbysunny/smart_bottom_sheet
repository: https://github.com/flutterbysunny/smart_bottom_sheet
issue_tracker: https://github.com/flutterbysunny/smart_bottom_sheet/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true